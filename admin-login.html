<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | MasterInfo Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet"></noscript>
  <script src="https://unpkg.com/@phosphor-icons/web@2.0.3"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      background: #f5f5f7;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      background: #ffffff;
      border: 1px solid #e2e2e8;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo img {
      height: 40px;
    }
    .login-logo-text {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 4px;
    }
    .login-logo-text span { color: #ff7a05; }
    .login-subtitle {
      font-size: 0.85rem;
      color: #6a6a7a;
      text-align: center;
      margin-top: 6px;
    }
    .login-form { display: flex; flex-direction: column; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #6a6a7a;
    }
    .form-group input {
      padding: 12px 14px;
      background: #f5f5f7;
      border: 1px solid #e2e2e8;
      border-radius: 10px;
      color: #1a1a2e;
      font-family: inherit;
      font-size: 0.95rem;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      outline: none;
      border-color: #ff7a05;
      box-shadow: 0 0 0 3px rgba(255,122,5,0.08);
    }
    .btn-login {
      padding: 14px;
      background: #ff7a05;
      color: #fff;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-login:hover { background: #ff9533; }
    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .login-error {
      background: rgba(239,68,68,0.06);
      border: 1px solid rgba(239,68,68,0.15);
      color: #ef4444;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      display: none;
    }
    .login-footer {
      text-align: center;
      margin-top: 24px;
    }
    .login-footer a {
      font-size: 0.85rem;
      color: #6a6a7a;
      text-decoration: none;
    }
    .login-footer a:hover { color: #ff7a05; }
    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <img src="logo-masterinfo.png" alt="MasterInfo Internet" style="height:40px;margin:0 auto;display:block;">
      <p class="login-subtitle">Painel Administrativo</p>
    </div>

    <form class="login-form" id="loginForm" onsubmit="return handleLogin(event)">
      <div class="form-group">
        <label for="usuario">Usuario</label>
        <input type="text" id="usuario" placeholder="admin" autocomplete="username" required autofocus>
      </div>
      <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="Sua senha" autocomplete="current-password" required>
      </div>

      <div class="login-error" id="loginError"></div>

      <button type="submit" class="btn-login" id="btnLogin">
        <span id="btnText"><i class="ph ph-sign-in"></i> Entrar</span>
        <div class="spinner" id="btnSpinner"></div>
      </button>
    </form>

    <div class="login-footer">
      <a href="index.html"><i class="ph ph-arrow-left"></i> Voltar ao site</a>
    </div>
  </div>

<script>
function handleLogin(e) {
  e.preventDefault();

  var usuario = document.getElementById('usuario').value.trim();
  var senha = document.getElementById('senha').value;
  var errorEl = document.getElementById('loginError');
  var btn = document.getElementById('btnLogin');
  var btnText = document.getElementById('btnText');
  var spinner = document.getElementById('btnSpinner');

  if (!usuario || !senha) {
    errorEl.textContent = 'Preencha usuario e senha.';
    errorEl.style.display = '';
    return false;
  }

  errorEl.style.display = 'none';
  btn.disabled = true;
  btnText.style.display = 'none';
  spinner.style.display = 'inline-block';

  fetch('auth/login.php', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ usuario: usuario, senha: senha })
  })
  .then(function(r) {
    return r.json().then(function(data) {
      return { status: r.status, data: data };
    });
  })
  .then(function(res) {
    btn.disabled = false;
    btnText.style.display = '';
    spinner.style.display = 'none';

    if (res.data.ok) {
      window.location.href = 'admin.html';
    } else {
      errorEl.textContent = res.data.error || 'Erro ao fazer login.';
      errorEl.style.display = '';
      document.getElementById('senha').value = '';
      document.getElementById('senha').focus();
    }
  })
  .catch(function() {
    btn.disabled = false;
    btnText.style.display = '';
    spinner.style.display = 'none';
    errorEl.textContent = 'Erro de conexao. Tente novamente.';
    errorEl.style.display = '';
  });

  return false;
}
</script>
</body>
</html>
