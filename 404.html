<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Página não encontrada (404) | MasterInfo Internet</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hanken Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: #faf7f2; color: #1a1a1a; min-height: 100vh;
      display: flex; align-items: center; justify-content: center; text-align: center; padding: 2rem;
    }
    .card { max-width: 580px; }
    .logo { height: 38px; width: auto; margin: 0 auto 2.5rem; display: block; }
    .code {
      font-size: clamp(4.5rem, 20vw, 9rem); font-weight: 800; line-height: 1; letter-spacing: -.02em;
      background: linear-gradient(135deg, #c1121f 0%, #ff7a05 50%, #fcc305 100%);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    h1 { font-size: 1.55rem; margin: 1.25rem 0 .75rem; line-height: 1.25; }
    p { color: #5a5a5a; font-size: 1.05rem; line-height: 1.6; margin: 0 auto 2.25rem; max-width: 440px; }
    .actions { display: flex; flex-wrap: wrap; gap: .75rem; justify-content: center; }
    .btn { display: inline-flex; align-items: center; padding: .85rem 1.5rem; border-radius: 999px; font-weight: 700; text-decoration: none; font-size: 1rem; transition: opacity .15s; }
    .btn-primary { background: linear-gradient(135deg, #ff7a05, #c1121f); color: #fff; }
    .btn-ghost { background: #fff; color: #1a1a1a; border: 1px solid #e4e0d8; }
    .btn:hover { opacity: .9; }
  </style>
</head>
<body>
  <main class="card">
    <img class="logo" src="/logo-masterinfo.png" alt="MasterInfo Internet">
    <div class="code">404</div>
    <h1>Essa página não existe (ou mudou de endereço)</h1>
    <p>Mas a internet fibra óptica 100% de Joinville continua aqui. Volte para o início ou veja os planos.</p>
    <div class="actions">
      <a class="btn btn-primary" href="/">Ir para o início</a>
      <a class="btn btn-ghost" href="/#planos">Ver planos</a>
      <a class="btn btn-ghost" href="/contato/">Falar com a gente</a>
    </div>
  </main>
</body>
</html>
